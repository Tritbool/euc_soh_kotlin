name: Android Release
# HOW TO
# git tag -a v0.1.0 -m "First public release"
# git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'   # déclenché sur v0.1.0, v1.0.0, etc.

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build Android release APK
        run: ./gradlew :euc-soh-android:assembleRelease --stacktrace --no-daemon

      - name: Upload release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: euc-soh-android-release-apk
          path: euc-soh-android/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "EUC SoH ${{
            github.ref_name
          }}"
          tag_name: ${{ github.ref_name }}
          files: euc-soh-android/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}