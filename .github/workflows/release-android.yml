name: Android Release
# HOW TO
# git tag -a v0.1.0 -m "First public release"
# git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'   # déclenché sur v0.1.0, v1.0.0, etc.

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Android release APK
        run: ./gradlew :euc-soh-android:assembleRelease --stacktrace --no-daemon

      - name: Sign APK
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDir: euc-soh-android/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename APK
        id: rename_apk
        run: |
          VERSION=${{ github.ref_name }}
          DEST="euc-soh-android/build/outputs/apk/release/euc-soh-analyzer-${VERSION}.apk"
          mv "${{ steps.sign_app.outputs.signedFile }}" "$DEST"
          echo "finalApk=$DEST" >> $GITHUB_OUTPUT

      - name: Upload release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: euc-soh-android-release-apk
          path: ${{ steps.rename_apk.outputs.finalApk }}
          retention-days: 30

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "EUC SoH ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.rename_apk.outputs.finalApk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clear temporary APKs
        run: |
          rm -f euc-soh-android/build/outputs/apk/release/*-unsigned.apk
          rm -f euc-soh-android/build/outputs/apk/release/*-unsigned-signed.apk
